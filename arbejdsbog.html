<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Helvetica,Arial,sans-serif;color:#1a1410;background:#5a4a3a;min-height:100vh}

/* Oversigt */
#oversigt{padding:32px;display:flex;flex-direction:column;align-items:center;gap:20px}
.top-bar{background:white;border-top:4px solid #b87c18;border-radius:6px;padding:20px 24px;max-width:640px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.top-bar h1{font-size:16px;font-weight:900;margin-bottom:3px}
.top-bar p{font-size:12px;color:#666}
.btn-alle{background:#1a1410;color:white;border:none;border-radius:4px;padding:10px 18px;font-family:inherit;font-size:12px;font-weight:bold;cursor:pointer;white-space:nowrap}
.btn-alle:hover{background:#b87c18}
.gruppe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;max-width:640px;width:100%}
.gk{background:#f7f2e8;border:1px solid #d0c8b0;border-radius:4px;padding:12px 14px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:3px;font-family:inherit;box-shadow:2px 3px 8px rgba(0,0,0,0.12);transition:transform .15s,box-shadow .15s}
.gk:hover{transform:translateY(-3px);box-shadow:3px 6px 16px rgba(0,0,0,0.22);background:white}
.gk-emne{font-size:7pt;font-weight:bold;letter-spacing:0.12em;text-transform:uppercase}
.gk-titel{font-size:10pt;font-weight:bold;color:#1a1410;line-height:1.3;margin-top:2px}
.gk-under{font-size:8pt;font-style:italic;color:#8a8078}
.gk-navne{font-size:8pt;color:#8a8078;margin-top:3px;padding-top:6px;border-top:0.5px solid #d0c8b0}
.tilbage-link{color:rgba(255,255,255,0.5);font-size:12px;text-decoration:none;margin-top:4px}
.tilbage-link:hover{color:white}

/* Tilbage-knap (vises mens print-sider er fremme) */
#tilbage-bar{display:none;padding:16px 32px;background:#5a4a3a;position:sticky;top:0;z-index:100;text-align:center}
.btn-tilbage{background:white;border:1px solid #d0c8b0;border-radius:4px;padding:8px 16px;font-family:inherit;font-size:12px;font-weight:bold;cursor:pointer;color:#1a1410}
.btn-tilbage:hover{background:#f0ead8}

/* A4 */
.a4{width:210mm;height:297mm;background:#F7F2E8;position:relative;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact;margin-bottom:24px}
.page-header{position:absolute;top:0;left:0;right:0;height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 20mm 0 30mm}
.page-header span{color:white;font-size:7pt;font-weight:bold;letter-spacing:0.12em}
.margin-line{position:absolute;left:22mm;top:0;bottom:0;width:1.5px;opacity:0.15}
.page-content{position:absolute;top:36px;bottom:28px;left:30mm;right:20mm;overflow:hidden}
.page-footer{position:absolute;bottom:0;left:0;right:0;height:24px;background:#e8e0cc;border-top:0.5px solid #d0c8b0;display:flex;align-items:center;justify-content:space-between;padding:0 20mm 0 30mm}
.page-footer span{font-size:7pt;color:#4a4038}

/* Forside */
.forside-wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:12px 0 8px}
.fs-meta{font-size:8pt;font-weight:bold;letter-spacing:0.2em;color:#8a8078;text-transform:uppercase;margin-bottom:10px}
.fs-titel{font-size:30pt;font-weight:900;letter-spacing:-0.02em;color:#1a1410;margin-bottom:4px}
.fs-sub{font-size:11pt;font-style:italic;color:#4a4038}
.fs-note{font-size:8pt;color:#8a8078;font-style:italic}
.sags-boks{background:white;border:1px solid #d0c8b0;padding:22px 26px;border-radius:2px;width:72mm;position:relative;box-shadow:2px 3px 10px rgba(0,0,0,0.08)}
.sags-tag{position:absolute;top:-9px;left:14px;background:white;padding:0 6px;font-size:7pt;font-weight:bold;letter-spacing:0.1em}
.sags-titel{font-size:15pt;font-weight:bold;text-align:center;margin-bottom:4px}
.sags-undertitel{font-size:9pt;font-style:italic;text-align:center;color:#8a8078;margin-bottom:12px}
.sags-separator{border-top:0.5px solid #d0c8b0;margin-bottom:10px}
.efterforsker-label{font-size:7pt;font-weight:bold;letter-spacing:0.15em;color:#8a8078;text-transform:uppercase;margin-bottom:8px}
.navn-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:7px}
.navn-nr{font-size:9pt;color:#8a8078;min-width:14px}
.navn{font-size:12pt;font-weight:bold}
.navn-linje{flex:1;border-bottom:0.5px solid #d0c8b0;margin-bottom:2px}

/* Ark-indhold */
.ark-label{font-size:7pt;font-weight:bold;letter-spacing:0.2em;text-transform:uppercase;color:#8a8078;margin-bottom:10px}
.mission-hdr{margin:12px 0 7px}
.mission-num{font-size:7pt;font-weight:bold;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2px}
.mission-titel{font-size:13pt;font-weight:bold;color:#1a1410;margin-bottom:3px}
.mission-linje{height:1px;opacity:0.3}
.pf-boks{background:rgba(240,234,216,0.8);border:0.5px solid #d0c8b0;padding:11px 13px;margin-bottom:12px;border-radius:2px}
.pf-label{font-size:7pt;font-weight:bold;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px}
.pf-tekst{font-size:9pt;line-height:1.6;margin-bottom:7px}
.pf-sep{border-top:0.4px solid #d0c8b0;margin-bottom:5px}
.pf-kort{font-size:9.5pt;font-style:italic;line-height:1.5}
.kilde-boks{border:0.5px solid;padding:10px 12px;margin-bottom:11px;border-radius:2px}
.kilde-label{font-size:8pt;font-weight:bold;letter-spacing:0.08em;margin-bottom:3px}
.kilde-tekst{font-size:9.5pt;line-height:1.5}
.felt-label{font-size:8pt;font-weight:bold;letter-spacing:0.08em;text-transform:uppercase;margin:11px 0 3px}
.felt-note{font-size:8.5pt;font-style:italic;color:#8a8078;margin-bottom:5px}
.linje{border-bottom:1px solid rgba(26,20,16,0.2);height:30px;margin-bottom:4px}
.spor-item,.tjek{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.boks{width:16px;height:16px;border:1.5px solid #1a1410;flex-shrink:0;margin-top:2px}
.spor-item span,.tjek span{font-size:9.5pt;line-height:1.5}
.spgsml-blok{margin-bottom:15px}
.spgsml-label{font-size:8pt;font-weight:bold;margin-bottom:3px}
.plan-tabel{width:100%;border-collapse:collapse;font-size:9pt;margin-top:5px}
.plan-tabel th{border:0.5px solid #d0c8b0;padding:5px 7px;text-align:left;font-size:8pt;font-weight:bold;background:#f0ead8}
.plan-tabel td{border:0.5px solid #d0c8b0;padding:4px 7px;height:33px}
.sss-blok{margin-bottom:9px}
.sss-label{font-size:8pt;font-weight:bold;letter-spacing:0.08em;margin-bottom:3px}

@media print{
  @page{size:A4;margin:0}
  body{background:white !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}

  #print-container{display:block !important}
  .a4{margin:0;page-break-after:always !important;break-after:page !important;box-shadow:none !important}
}</style>
</head>

<script>
const G = {"0": "<div class=\"a4\" style=\"\">\n  <div class=\"page-header\" style=\"background:#A03028\">\n    <span>PROJEKT 2026 · LANDBRUG I DANMARK</span>\n    <span>ETIK · SAG 04</span>\n  </div>\n  <div class=\"margin-line\" style=\"background:#A03028\"></div>\n  <div class=\"page-content\">\n<div class=\"forside-wrap\">\n  <div class=\"forside-top\">\n    <p class=\"fs-meta\">Projekt 2026 · Landbrug i Danmark</p>\n    <h1 class=\"fs-titel\">EFTERFORSKNINGS-LOG</h1>\n    <p class=\"fs-sub\">Fra hesteforspand til højteknologi</p>\n  </div>\n  <div class=\"sags-boks\">\n    <div class=\"sags-tag\" style=\"color:#A03028\">ETIK · SAG 04</div>\n    <p class=\"sags-titel\">Det gode dyreliv</p>\n    <p class=\"sags-undertitel\">Grise i dansk landbrug</p>\n    <div class=\"sags-separator\"></div>\n    <p class=\"efterforsker-label\">Efterforskere</p>\n    <div class=\"navn-row\">\n      <span class=\"navn-nr\">1.</span>\n      <span class=\"navn\">Julius</span>\n      <div class=\"navn-linje\"></div>\n    </div>\n<div class=\"navn-row\">\n      <span class=\"navn-nr\">2.</span>\n      <span class=\"navn\">Benjamin</span>\n      <div class=\"navn-linje\"></div>\n    </div>\n<div class=\"navn-row\">\n      <span class=\"navn-nr\">3.</span>\n      <span class=\"navn\">Emma</span>\n      <div class=\"navn-linje\"></div>\n    </div>\n<div class=\"navn-row\">\n      <span class=\"navn-nr\">4.</span>\n      <span class=\"navn\">Nellie</span>\n      <div class=\"navn-linje\"></div>\n    </div>\n  </div>\n  <p class=\"fs-note\">Denne logbog skal følge jeres arbejde hele ugen.</p>\n</div>\n  </div>\n  <div class=\"page-footer\">\n    <span>Det gode dyreliv</span>\n    <span>Grise i dansk landbrug</span>\n  </div>\n</div>\n<div class=\"a4\" style=\"\">\n  <div class=\"page-header\" style=\"background:#A03028\">\n    <span>PROJEKT 2026 · LANDBRUG I DANMARK</span>\n    <span>ETIK · SAG 04</span>\n  </div>\n  <div class=\"margin-line\" style=\"background:#A03028\"></div>\n  <div class=\"page-content\">\n<p class=\"ark-label\">Mandag · Ark 1</p>\n<div class=\"pf-boks\">\n  <p class=\"pf-label\" style=\"color:#A03028\">Problemformulering</p>\n  <p class=\"pf-tekst\">I Danmark har vi millioner af landbrugsdyr, og det skaber debat om, hvordan dyrene har det i staldene. Der er regler og love for dyrevelfærd, som landmænd skal overholde. Der er dog stadig stor forskel på hvordan dyrene har det, bl.a. afhængigt af om de er ude eller inde. Vi vil undersøge levevilkår for udvalgte danske landbrugsdyr og se på, hvad der skal til for at man kan tale om et godt dyreliv i moderne landbrug.</p>\n  <div class=\"pf-sep\"></div>\n  <p class=\"pf-kort\"><strong style=\"color:#A03028\">Kort sagt:</strong> Har dyrene i dansk landbrug det godt nok? Det skal I undersøge – og I skal mene noget om svaret.</p>\n</div>\n<div class=\"mission-hdr\">\n  <p class=\"mission-num\" style=\"color:#A03028\">Mission 1</p>\n  <p class=\"mission-titel\">Forstå sagen</p>\n  <div class=\"mission-linje\" style=\"background:#A03028\"></div>\n</div>\n<p class=\"felt-note\">Forklar med jeres egne ord hvad sagen handler om:</p>\n<div class=\"linje\"></div>\n<div class=\"linje\"></div>\n<div class=\"linje\"></div>\n<div class=\"linje\"></div>\n  </div>\n  <div class=\"page-footer\">\n    <span>Det gode dyreliv</span>\n    <span>Grise i dansk landbrug</span>\n  </div>\n</div>\n<div class=\"a4\" style=\"\">\n  <div class=\"page-header\" style=\"background:#A03028\">\n    <span>PROJEKT 2026 · LANDBRUG I DANMARK</span>\n    <span>ETIK · SAG 04</span>\n  </div>\n  <div class=\"margin-line\" style=\"background:#A03028\"></div>\n  <div class=\"page-content\">\n<p class=\"ark-label\">Mandag · Ark 2</p>\n<div class=\"mission-hdr\">\n  <p class=\"mission-num\" style=\"color:#A03028\">Mission 2</p>\n  <p class=\"mission-titel\">Gerningssted og spor</p>\n  <div class=\"mission-linje\" style=\"background:#A03028\"></div>\n</div>\n<div class=\"kilde-boks\" style=\"background:#A0302818;border-color:#A0302844\">\n  <p class=\"kilde-label\" style=\"color:#A03028\">☑  Læs kilden i Detektivarkivet:</p>\n  <p class=\"kilde-tekst\">Faktalink: Dyrevelfærd – afsnittet om svin. Læs introduktionen og afsnittet om svin. I behøver ikke læse resten.</p>\n</div>\n<p class=\"felt-label\" style=\"color:#A03028\">Sæt kryds ved 1–2 spor I vil følge:</p>\n<div class=\"spor-item\"><div class=\"boks\"></div><span>Hvad skal der til for at et dyr har et godt liv – og bestemmer loven det?</span></div>\n<div class=\"spor-item\"><div class=\"boks\"></div><span>Hvorfor er der så stor forskel på hvordan dyr har det, selv når reglerne er de samme?</span></div>\n<div class=\"spor-item\"><div class=\"boks\"></div><span>Hvornår er det okay at bruge dyr til mad – og hvornår går det for vidt?</span></div>\n<div class=\"spor-item\"><div class=\"boks\"></div><span>Hvis dyrene kunne tale – hvad ville de sige om dansk landbrug?</span></div>\n<div class=\"spor-item\"><div class=\"boks\"></div><span>Jeres eget spørgsmål (valgfrit):</span></div>\n<div class=\"linje\"></div>\n<p class=\"felt-label\" style=\"color:#A03028\">Jeres konkrete fokus</p>\n<p class=\"felt-note\">Hvad vil I undersøge helt specifikt?</p>\n<div class=\"linje\"></div>\n<div class=\"linje\"></div>\n  </div>\n  <div class=\"page-footer\">\n    <span>Det gode dyreliv</span>\n    <span>Grise i dansk landbrug</span>\n  </div>\n</div>\n<div class=\"a4\" style=\"\">\n  <div class=\"page-header\" style=\"background:#A03028\">\n    <span>PROJEKT 2026 · LANDBRUG I DANMARK</span>\n    <span>ETIK · SAG 04</span>\n  </div>\n  <div class=\"margin-line\" style=\"background:#A03028\"></div>\n  <div class=\"page-content\">\n<p class=\"ark-label\">Mandag · Ark 3</p>\n<div class=\"mission-hdr\">\n  <p class=\"mission-num\" style=\"color:#A03028\">Mission 3</p>\n  <p class=\"mission-titel\">Find hullerne i jeres viden</p>\n  <div class=\"mission-linje\" style=\"background:#A03028\"></div>\n</div>\n<p class=\"felt-note\">Skriv de 5 vigtigste spørgsmål I function visOversigt() {
  document.getElementById('oversigt').style.display = 'flex';
  document.getElementById('tilbage-bar').style.display = 'none';
  const c = document.getElementById('print-container');
  c.style.display = 'none';
  c.innerHTML = '';
  window.scrollTo(0,0);
}

function visPrint(html) {
  const c = document.getElementById('print-container');
  c.innerHTML = html;
  c.style.display = 'flex';
  document.getElementById('oversigt').style.display = 'none';
  document.getElementById('tilbage-bar').style.display = 'block';
  window.scrollTo(0,0);
  window.print();
  window.addEventListener('afterprint', function h() {
    window.removeEventListener('afterprint', h);
    visOversigt();
  });
}

function doPrint(gi) {
  visPrint(G[gi]);
}

function doPrintAlle() {
  visPrint(Object.values(G).join(''));
}
