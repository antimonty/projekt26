<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sag 01 – Livet på landet i gamle dage</title>
<style>
:root {
  --paper:#f7f2e8; --paper2:#f0ead8; --paper3:#ede6d4; --paper4:#e8e0cc;
  --ink:#1a1410; --ink-soft:#4a4038; --ink-muted:#8a8078;
  --border:#d0c8b0; --border2:#b8b0a0;
  --gold:#b87c18; --gold-bg:rgba(184,124,24,0.09);
  --green:#2a7a58; --green-bg:rgba(42,122,88,0.09); --green-light:#e8f4ee;
  --red:#a03028; --red-bg:rgba(160,48,40,0.08);
  --blue:#2a5a8a; --blue-bg:rgba(42,90,138,0.08);
  --shadow:rgba(26,20,16,0.09); --shadow2:rgba(26,20,16,0.16);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper2);
  color: var(--ink);
  font-family: Verdana, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
}

/* ── INTRO ── */
#intro {
  position:fixed; inset:0;
  background:var(--paper2);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(180,160,120,0.10) 32px,rgba(180,160,120,0.10) 33px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:1000; padding:2rem;
}
.intro-card {
  background:var(--paper); border:1px solid var(--border); border-radius:4px;
  box-shadow:4px 4px 20px var(--shadow), 0 0 0 4px var(--paper), 0 0 0 5px var(--border);
  padding:2.5rem 2.5rem 2rem; max-width:460px; width:100%; position:relative; overflow:hidden;
}
.intro-card::before { content:''; position:absolute; top:0; left:28px; width:2px; height:100%; background:rgba(160,48,40,0.18); }
.tw-wrap { margin-bottom:1.25rem; padding-left:1.5rem; }
.tl { font-family:'Courier New',monospace; font-size:1.1rem; color:var(--ink); min-height:1.7em; margin-bottom:.3rem; }
.tl.s { font-size:.9rem; color:var(--ink-soft); font-family:Verdana,sans-serif; font-style:italic; }
.team-intro { font-size:.8rem; font-weight:700; color:var(--green); padding-left:1.5rem; margin-bottom:1.25rem; letter-spacing:.02em; }
#start-btn {
  margin-left:1.5rem; background:var(--ink); border:none; border-radius:3px; color:var(--paper);
  font-family:Verdana,sans-serif; font-size:.82rem; font-weight:700; letter-spacing:.05em;
  padding:.7rem 1.75rem; cursor:pointer; transition:all .18s; box-shadow:2px 2px 8px var(--shadow);
}
#start-btn:hover { background:var(--gold); transform:translateY(-1px); }

/* ── APP SHELL ── */
#app { display:none; height:100vh; flex-direction:column; }

/* ── TOPBAR ── */
.topbar {
  background:var(--paper); border-bottom:1px solid var(--border);
  padding:.65rem 1.25rem; display:flex; align-items:center; gap:1rem;
  flex-shrink:0; box-shadow:0 1px 5px var(--shadow); z-index:10;
}
.topbar-case { flex:1; min-width:0; }
.topbar-meta { font-size:.65rem; font-weight:700; letter-spacing:.18em; color:var(--ink-muted); text-transform:uppercase; margin-bottom:.12rem; }
.topbar-title { font-size:1.05rem; font-weight:700; color:var(--ink); line-height:1.15; }
.topbar-team { font-size:.75rem; font-weight:700; color:var(--green); margin-top:.12rem; }
.stamped { font-size:.6rem; font-weight:700; letter-spacing:.18em; color:var(--red); border:2px solid var(--red); border-radius:2px; padding:3px 7px; transform:rotate(2deg); opacity:.6; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
.day-tabs { display:flex; gap:.22rem; flex-shrink:0; }
.day-tab {
  font-size:.68rem; font-weight:700; color:var(--ink-muted); padding:.42rem .65rem; cursor:pointer;
  border:1px solid var(--border); border-radius:3px; background:var(--paper2);
  transition:all .15s; text-align:center; text-transform:uppercase; white-space:nowrap; letter-spacing:.04em;
}
.day-tab:hover { color:var(--ink); background:var(--paper); }
.day-tab.active { color:var(--paper); background:var(--ink); border-color:var(--ink); }
.day-tab.today-tab:not(.active) { border-color:var(--gold); color:var(--gold); font-weight:700; }
.day-tab.locked-tab { opacity:.45; cursor:default; }
.day-tab.locked-tab:hover { color:var(--ink-muted); background:var(--paper2); }
.day-tab.friday-tab:not(.active) { border-color:var(--gold); color:var(--gold); }
.day-tab.friday-tab.active { background:var(--gold); border-color:var(--gold); }

/* ── SPLIT ── */
.split { display:grid; grid-template-columns:1fr 1fr; flex:1; overflow:hidden; }

/* ── LEFT PANE ── */
.left-pane {
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  background:var(--paper2);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(180,160,120,0.10) 32px,rgba(180,160,120,0.10) 33px);
}
.left-scroll { flex:1; overflow-y:auto; padding:1rem 1rem 3rem; scroll-behavior:smooth; }

/* Day intro */
.day-intro {
  background:var(--paper); border:1px solid var(--border);
  border-left:3px solid var(--gold); border-radius:0 3px 3px 0;
  padding:.7rem .9rem; margin-bottom:.9rem;
  font-size:.88rem; line-height:1.65; color:var(--ink-soft);
}

/* ── MISSION CARD ── */
.mission-card {
  background:var(--paper); border:1px solid var(--border);
  border-radius:4px; margin-bottom:.6rem;
  box-shadow:1px 1px 4px var(--shadow); overflow:hidden;
}
.mission-card.done { opacity:.55; }
.mission-card.active-card { border-color:var(--border2); box-shadow:1px 2px 7px var(--shadow); }

.mission-header {
  padding:.65rem .9rem; background:var(--paper2);
  border-bottom:1px solid transparent;
  display:flex; align-items:center; gap:.65rem;
  cursor:pointer; user-select:none; transition:background .12s;
}
.mission-card.open .mission-header { border-bottom-color:var(--border); }
.mission-header:hover { background:var(--paper3); }

.mh-check {
  width:20px; height:20px; border-radius:50%; border:2px solid var(--border);
  flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .18s;
}
.mission-card.done .mh-check { background:var(--green); border-color:var(--green); }
.mh-checkmark { width:8px; height:5px; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(-45deg) translateY(-1px); opacity:0; transition:opacity .18s; }
.mission-card.done .mh-checkmark { opacity:1; }

.mh-text { flex:1; }
.mh-num { font-size:.6rem; font-weight:700; letter-spacing:.15em; color:var(--gold); text-transform:uppercase; margin-bottom:.08rem; }
.mission-card.done .mh-num { color:var(--ink-muted); }
.mh-title { font-size:.88rem; font-weight:700; color:var(--ink); }
.mh-chevron { font-size:.65rem; color:var(--ink-muted); transition:transform .22s; flex-shrink:0; }
.mission-card.open .mh-chevron { transform:rotate(180deg); }

.mission-body-wrap { display:grid; grid-template-rows:0fr; transition:grid-template-rows .25s ease; }
.mission-card.open .mission-body-wrap { grid-template-rows:1fr; }
.mission-body-inner { overflow:hidden; }
.mission-body { padding:.85rem .9rem .9rem; }
.mission-body p { font-size:.88rem; line-height:1.68; color:var(--ink); margin-bottom:.5rem; }
.mission-body p:last-child { margin-bottom:0; }

.m-card { background:var(--paper2); border:1px solid var(--border); border-radius:3px; padding:.75rem .9rem; margin-bottom:.45rem; }
.m-card p { font-size:.88rem; line-height:1.68; color:var(--ink); }
.m-card p+p { margin-top:.45rem; }
.pf-toggle { display:flex; gap:.28rem; margin-bottom:.55rem; }
.pf-btn { font-size:.65rem; font-weight:700; padding:.26rem .75rem; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--ink-muted); cursor:pointer; transition:all .12s; }
.pf-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-bg); }
.pf-content { display:none; } .pf-content.active { display:block; }

/* Mission locked placeholder */
.mission-locked {
  background:var(--paper3); border:1px dashed var(--border); border-radius:4px;
  padding:.6rem .9rem; margin-bottom:.6rem; opacity:.38;
  font-size:.72rem; font-weight:700; letter-spacing:.1em; color:var(--ink-muted); text-transform:uppercase;
}

/* ── RIGHT PANE ── */
.right-pane {
  display:flex; flex-direction:column; overflow:hidden;
  background:#fdfaf3;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 32px,rgba(42,122,88,0.10) 32px,rgba(42,122,88,0.10) 33px);
  position:relative;
}
/* Red margin line */
.right-pane::before { content:''; position:absolute; top:0; bottom:0; left:42px; width:1.5px; background:rgba(160,48,40,0.18); pointer-events:none; z-index:1; }

.right-topbar {
  background:var(--green); border-bottom:1px solid var(--border);
  padding:.55rem 1rem .55rem 3.2rem;
  font-size:.72rem; font-weight:700; letter-spacing:.1em;
  color:rgba(255,255,255,0.92); text-transform:uppercase;
  flex-shrink:0; position:relative; z-index:2;
  display:flex; align-items:center; gap:.5rem;
}
.right-topbar-icon { font-size:.95rem; }

.right-scroll { flex:1; overflow-y:auto; padding:1rem 1.1rem 2rem 3.2rem; position:relative; z-index:1; }

/* Work area panels */
.work-panel { display:none; }
.work-panel.active { display:block; animation:wpin .25s ease; }
@keyframes wpin { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* Source iframe panel */
.source-frame-wrap {
  background:var(--paper); border:1px solid var(--border); border-radius:3px;
  margin-bottom:.85rem; overflow:hidden;
}
.source-frame-bar {
  background:var(--paper3); padding:.45rem .75rem;
  display:flex; align-items:center; gap:.5rem;
  border-bottom:1px solid var(--border);
  font-size:.72rem; font-weight:700; color:var(--ink-muted);
}
.source-frame-bar a { color:var(--green); text-decoration:none; font-size:.72rem; font-weight:700; margin-left:auto; }
.source-frame-bar a:hover { color:var(--ink); }
.source-iframe { width:100%; height:260px; border:none; display:block; }

/* Field labels */
.field-label { font-size:.72rem; font-weight:700; letter-spacing:.1em; color:var(--green); text-transform:uppercase; margin-bottom:.3rem; display:block; border-left:3px solid var(--green); padding-left:.55rem; }
.field-note { font-size:.82rem; color:var(--ink-soft); margin-bottom:.55rem; line-height:1.55; }

/* Text fields */
.work-field {
  width:100%; background:var(--paper2); border:1px solid var(--border);
  border-radius:3px;
  color:var(--ink); font-family:Verdana,sans-serif; font-size:.88rem;
  line-height:32px; padding:0 .7rem;
  resize:none; outline:none; min-height:32px; margin-bottom:.85rem;
  transition:border-color .18s;
  background-image:repeating-linear-gradient(transparent, transparent 31px, rgba(42,122,88,0.10) 31px, rgba(42,122,88,0.10) 32px);
  background-size:100% 32px;
  background-attachment:local;
}
.work-field:focus {
  border-color:var(--gold);
  background-color:var(--paper);
}
.work-field::placeholder { color:var(--ink-muted); font-style:italic; font-size:.85rem; }

/* Spor checkboxes */
.spor-list { margin-bottom:.75rem; }
.spor-item {
  display:flex; align-items:flex-start; gap:.55rem;
  margin-bottom:.35rem; cursor:pointer; padding:.3rem .4rem;
  border-radius:3px; transition:background .12s; user-select:none;
}
.spor-item:hover { background:var(--gold-bg); }
.spor-item.chosen { background:var(--gold-bg); }
.spor-box {
  width:17px; height:17px; border:2px solid var(--border2); border-radius:2px;
  flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center;
  transition:all .15s; font-size:.6rem; color:transparent; font-weight:700;
}
.spor-item.chosen .spor-box { border-color:var(--gold); background:var(--gold); color:var(--paper); }
.spor-text { font-size:.87rem; line-height:1.45; color:var(--ink); }

/* Previous day's questions */
.prev-questions {
  background:var(--blue-bg); border:1px solid rgba(42,90,138,0.2);
  border-left:3px solid var(--blue); border-radius:0 3px 3px 0;
  padding:.75rem .9rem; margin-bottom:.85rem;
}
.prev-q-title { font-size:.68rem; font-weight:700; letter-spacing:.12em; color:var(--blue); text-transform:uppercase; margin-bottom:.4rem; }
.prev-q-item { font-size:.87rem; color:var(--ink); margin-bottom:.28rem; line-height:1.5; padding-left:.4rem; border-left:2px solid rgba(42,90,138,0.25); }

/* Kplan */
.kplan-hdr { display:grid; grid-template-columns:1fr 1fr 80px; gap:.3rem; font-size:.68rem; font-weight:700; color:var(--green); padding-bottom:.22rem; border-bottom:1px solid var(--border); margin-bottom:.3rem; letter-spacing:.05em; }
.kplan-row { display:grid; grid-template-columns:1fr 1fr 80px; gap:.3rem; margin-bottom:.25rem; }
.kplan-input { background:var(--paper2); border:1px solid var(--border); border-radius:3px; color:var(--ink); font-family:Verdana,sans-serif; font-size:.87rem; padding:.18rem .4rem; outline:none; width:100%; transition:border-color .15s; }
.kplan-input:focus { border-color:var(--gold); background:var(--paper); }
.kplan-input::placeholder { color:var(--ink-muted); font-style:italic; font-size:.8rem; }
.add-row-btn { background:transparent; border:none; color:rgba(42,122,88,.45); font-size:.82rem; cursor:pointer; padding:.12rem .2rem; transition:color .12s; margin-top:.1rem; font-family:Verdana,sans-serif; }
.add-row-btn:hover { color:var(--green); }

/* SSS */
.sss-label { font-size:.78rem; font-weight:700; margin-bottom:.1rem; display:block; }
.sss-label.start { color:var(--green); } .sss-label.stop { color:var(--red); } .sss-label.go { color:var(--gold); }
.sss-expl { font-size:.8rem; color:var(--ink-muted); margin-bottom:.3rem; line-height:1.45; font-style:italic; }
.sss-field { width:100%; background:var(--paper2); border:1px solid var(--border); border-radius:3px; color:var(--ink); font-family:Verdana,sans-serif; font-size:.87rem; padding:.18rem .4rem; outline:none; resize:none; min-height:52px; transition:border-color .15s; line-height:1.65; margin-bottom:.8rem; }
.sss-field:focus { border-bottom-color:var(--gold); }

/* Fremlaeg */
.fl-step { display:flex; gap:.6rem; align-items:flex-start; background:var(--paper2); border:1px solid var(--border); border-radius:3px; padding:.6rem .75rem; margin-bottom:.32rem; }
.fl-num { font-size:.95rem; font-weight:700; color:var(--gold); flex-shrink:0; width:18px; line-height:1.4; }
.fl-body { flex:1; }
.fl-text { font-size:.85rem; line-height:1.5; color:var(--ink); }
.pull-lbl { font-size:.6rem; font-weight:700; letter-spacing:.12em; color:var(--green); text-transform:uppercase; margin:.28rem 0 .12rem; display:block; }
.pull-field { background:var(--green-bg); border:1px solid rgba(42,122,88,0.18); border-radius:3px; padding:.42rem .65rem; font-size:.85rem; line-height:1.58; color:var(--ink-soft); font-style:italic; min-height:1.8em; white-space:pre-wrap; }
.pull-field.empty { color:var(--ink-muted); }

/* Next btn */
.next-btn {
  display:inline-flex; align-items:center; gap:.4rem; margin-top:.85rem;
  background:var(--ink); border:none; border-radius:3px; color:var(--paper);
  font-family:Verdana,sans-serif; font-size:.78rem; font-weight:700; letter-spacing:.04em;
  padding:.58rem 1.15rem; cursor:pointer; transition:all .18s; box-shadow:1px 2px 5px var(--shadow);
}
.next-btn:hover { background:var(--gold); transform:translateY(-1px); }

/* ── DAY SUMMARY / CLOSE ── */
.close-day-btn {
  display:block; width:100%; margin-top:1.5rem;
  background:var(--green); border:none; border-radius:3px; color:white;
  font-family:Verdana,sans-serif; font-size:.82rem; font-weight:700; letter-spacing:.04em;
  padding:.65rem 1rem; cursor:pointer; transition:all .18s; text-align:center;
}
.close-day-btn:hover { background:#1f5e42; }

/* Summary overlay */
#summary-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(26,20,16,0.55); z-index:500;
  align-items:center; justify-content:center; padding:1.5rem;
}
#summary-overlay.open { display:flex; }
.summary-box {
  background:var(--paper); border:1px solid var(--border); border-radius:6px;
  box-shadow:0 8px 32px var(--shadow2); width:100%; max-width:560px;
  max-height:85vh; overflow-y:auto; padding:1.75rem 2rem;
}
.summary-title { font-size:1rem; font-weight:700; color:var(--ink); margin-bottom:.25rem; }
.summary-meta { font-size:.78rem; color:var(--ink-muted); margin-bottom:1.25rem; }
.summary-section { margin-bottom:1rem; }
.summary-lbl { font-size:.65rem; font-weight:700; letter-spacing:.14em; color:var(--green); text-transform:uppercase; margin-bottom:.28rem; }
.summary-val { font-size:.88rem; color:var(--ink); line-height:1.6; background:var(--paper2); border:1px solid var(--border); border-radius:3px; padding:.55rem .75rem; white-space:pre-wrap; }
.summary-val.empty { color:var(--ink-muted); font-style:italic; }
.teacher-section { border-top:1px solid var(--border); padding-top:1.1rem; margin-top:1.1rem; }
.teacher-lbl { font-size:.72rem; font-weight:700; letter-spacing:.12em; color:var(--gold); text-transform:uppercase; margin-bottom:.45rem; }
.teacher-comment {
  width:100%; background:var(--paper2); border:1px solid var(--border); border-radius:3px;
  color:var(--ink); font-family:Verdana,sans-serif; font-size:.88rem;
  padding:.55rem .75rem; resize:none; min-height:72px; outline:none; margin-bottom:.75rem;
  transition:border-color .15s; line-height:1.6;
}
.teacher-comment:focus { border-color:var(--gold); }
.teacher-code-row { display:flex; gap:.5rem; align-items:center; margin-bottom:.5rem; }
.teacher-code-input { background:var(--paper); border:1px solid var(--border); border-radius:3px; color:var(--ink); font-family:Verdana,sans-serif; font-size:.9rem; font-weight:700; letter-spacing:.15em; padding:.45rem .75rem; outline:none; width:110px; text-align:center; }
.teacher-code-input:focus { border-color:var(--gold); }
.approve-btn { background:var(--green); border:none; border-radius:3px; color:white; font-family:Verdana,sans-serif; font-size:.78rem; font-weight:700; padding:.5rem 1.1rem; cursor:pointer; transition:all .18s; letter-spacing:.04em; }
.approve-btn:hover { background:#1f5e42; }
.approve-error { font-size:.75rem; color:var(--red); font-weight:700; display:none; }
.prev-feedback {
  background:var(--gold-bg); border:1px solid rgba(184,124,24,0.25);
  border-left:3px solid var(--gold); border-radius:0 3px 3px 0;
  padding:.65rem .85rem; margin-bottom:.85rem;
}
.prev-feedback-lbl { font-size:.65rem; font-weight:700; letter-spacing:.12em; color:var(--gold); text-transform:uppercase; margin-bottom:.2rem; }
.prev-feedback-text { font-size:.87rem; color:var(--ink); line-height:1.55; }

/* Friday */
.friday-lock { text-align:center; padding:3rem 1rem; }
.lock-icon { font-size:2rem; margin-bottom:.65rem; opacity:.3; }
.lock-label { font-size:.65rem; font-weight:700; letter-spacing:.18em; color:var(--ink-muted); text-transform:uppercase; margin-bottom:1.1rem; }
.lock-input-wrap { display:flex; gap:.4rem; justify-content:center; margin-bottom:.45rem; }
.lock-input { background:var(--paper); border:1px solid var(--border); border-radius:3px; color:var(--ink); font-family:Verdana,sans-serif; font-size:.95rem; font-weight:700; letter-spacing:.15em; padding:.48rem .85rem; outline:none; text-align:center; width:115px; }
.lock-input:focus { border-color:var(--gold); }
.lock-btn { background:var(--ink); border:none; border-radius:3px; color:var(--paper); font-family:Verdana,sans-serif; font-size:.75rem; font-weight:700; letter-spacing:.04em; padding:.55rem 1rem; cursor:pointer; transition:all .18s; }
.lock-btn:hover { background:var(--gold); }
.lock-error { font-size:.72rem; color:var(--red); font-weight:700; display:none; margin-top:.38rem; }
.schedule-board { display:grid; grid-template-columns:1fr 1fr; gap:.85rem; margin-bottom:.85rem; }
.room-col { background:var(--paper); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.room-hdr { background:var(--paper3); padding:.55rem .85rem; font-size:.65rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-muted); border-bottom:1px solid var(--border); }
.time-slots { padding:.5rem; }
.time-slot { background:var(--paper2); border:1px solid var(--border); border-radius:3px; margin-bottom:.35rem; min-height:44px; transition:background .12s; }
.time-slot.drag-over { background:var(--gold-bg); border-color:var(--gold); }
.slot-tr { display:flex; align-items:center; gap:.38rem; padding:.26rem .5rem .16rem; }
.slot-ti { background:transparent; border:none; border-bottom:1px dashed var(--border); color:var(--ink-muted); font-family:Verdana,sans-serif; font-size:.65rem; font-weight:700; letter-spacing:.04em; outline:none; width:105px; padding:.06rem .1rem; }
.slot-ti:focus { border-color:var(--gold); color:var(--ink); }
.slot-rm { background:none; border:none; color:var(--ink-muted); cursor:pointer; font-size:.68rem; padding:.06rem .22rem; opacity:.38; }
.slot-rm:hover { color:var(--red); opacity:1; }
.slot-da { min-height:26px; padding:.12rem .35rem .28rem; display:flex; align-items:center; }

<body>

</div>

<!-- SUMMARY OVERLAY -->

</div>

<!-- APP -->
<div id="app">
  <div class="topbar">

      <div class="topbar-meta">Projekt 2026 · Sag 01 · HISTORIE</div>

</div>

<script>
const GK='historie1', GROUP_LABEL='Historie 1', TEACHER_CODE='Refs';
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbznadoOCu219A8tVRiFeQ-dm-t1H00958POyFNerZmVBuuG5bgBaoZjzTCf5GSZ1JfzbQ/exec';
const SCHEDULE_KEY='fredag-plan';
const ALL_GROUPS=['Etik 1','Etik 2','Samfund 1','Samfund 2','Historie 1','Historie 2','Historie 3','Historie 4','Miljø','Fremtid'];
const DAYS=['mandag','tirsdag','onsdag','torsdag'];

let saveTimer=null, dragTile=null, currentDay='mandag';
const state = {
  unlocked:{mandag:0,tirsdag:0,onsdag:0,torsdag:0},
  expanded:{mandag:{},tirsdag:{},onsdag:{},torsdag:{}},
  approved:{mandag:false,tirsdag:false,onsdag:false,torsdag:false},
  feedback:{mandag:'',tirsdag:'',onsdag:'',torsdag:''},
  fields:{},  // all work fields keyed by id
};
let scheduleData={slots:{}};

/* ── MISSIONS DEFINITION ── */
const DAY_INTROS={
  mandag:'Læs sagen og gerningsstedet. Vælg jeres spor. Find det I ikke forstår endnu – det undersøger I i morgen.',
  tirsdag:'Find svar på det I ikke vidste mandag. Skriv beviser. Beslut produkt og lav en plan for onsdag.',
  onsdag:'Lav produktet. Saml materialer, producér, og tjek at produktet viser jeres pointe.',
  torsdag:'Saml trådene. Øv fremlæggelsen med guiden. Evaluer samarbejdet.'
};

// Each mission: { num, title, left: html for left pane, right: fn(day)→html for right pane }
const MISSIONS = {
mandag:[
  { num:'Mission 1', title:'Forstå sagen',
    left:`<p>Læs jeres sag – vælg den detaljerede eller den enkle version.</p>
      <div class="pf-toggle"><button class="pf-btn active" onclick="togglePF('detail',this)">Detaljeret</button><button class="pf-btn" onclick="togglePF('enkel',this)">Enkel</button></div>
      <div class="m-card pf-content active" id="pf-detail"><p>Landbrug går lang tilbage i tiden. Faktisk helt tilbage til stenalderen har mennesker dyrket jorden og haft husdyr, som kunne hjælpe til eller bruges til at spise. Den måde vi har drevet landbrug på, har ændret sig meget gennem tiderne. Særligt er der sket en stor udvikling gennem de seneste årtier, fra den gang vores bedsteforældre og oldeforældre drev landbrug og til nutidens moderne landbrug.</p><p>Vi vil gerne undersøge hvordan landbruget har ændret sig fra for 100 år siden og til nutiden. Vi vil også gerne finde ud af hvorfor landbruget har ændret sig så meget.</p></div>
      <div class="m-card pf-content" id="pf-enkel"><p>Landbruget ser helt anderledes ud i dag end for 100 år siden. Hvad skete der – og hvorfor? Det skal I undersøge.</p></div>
      <p class="note-txt" style="margin-top:.55rem"><span class="hl">I er i mål</span> når alle kan forklare sagen med egne ord.</p>`,
    right:`<span class="field-label">Hvad handler sagen om?</span>
      <p class="field-note">Skriv med jeres egne ord – ikke kopier fra teksten.</p>
      <textarea class="work-field" id="f-sag" rows="4" placeholder="Skriv her..." oninput="syncField('f-sag')"></textarea>`
  },
  { num:'Mission 2', title:'Gerningsstedet og spor',
    left:`<p>Åbn linket til højre og læs frem til og med afsnittet om traktoren. Fokusér på hvad der ændrede sig da traktoren kom – og hvad det betød for landmanden og hans familie.</p>
      <p style="margin-top:.5rem">Vælg derefter 1–2 spor. I kan også skrive jeres eget spørgsmål. Indsnævr til sidst jeres fokus.</p>
      <p class="note-txt" style="margin-top:.45rem"><span class="hl">I er i mål</span> når I har valgt spor og skrevet jeres konkrete fokus.</p>`,
    right:`<div class="source-link-box">
        <div class="source-link-label">Gerningsstedet – læs dette inden I vælger spor</div>
        <div class="source-link-hint">Læs <strong>kun</strong> de første tre afsnit om familien og traktoren i 1949 – I behøver ikke læse hele artiklen.</div>
        <a class="source-open-btn" href="https://www.dr.dk/nyheder/kultur/historie/dansk-landbrug-i-70-aar-fra-alsidigt-familiebrug-til-specialiserede">Åbn DR: Dansk landbrug i 70 år →</a>
      </div>
      <span class="field-label">Vælg 1–2 spor (klik)</span>
      <div class="spor-list" id="spor-list">
        <div class="spor-item" onclick="toggleSpor(this)" data-i="0"><div class="spor-box">✓</div><span class="spor-text">Hvordan ændrede livet sig på en gård da traktoren kom – og hvem forsvandt?</span></div>
        <div class="spor-item" onclick="toggleSpor(this)" data-i="1"><div class="spor-box">✓</div><span class="spor-text">Hvorfor gik Danmark fra hundredtusindvis af små gårde til nogle få kæmpestore?</span></div>
        <div class="spor-item" onclick="toggleSpor(this)" data-i="2"><div class="spor-box">✓</div><span class="spor-text">Hvad betød det for landsbyen at færre og færre arbejdede på landet?</span></div>
        <div class="spor-item" onclick="toggleSpor(this)" data-i="3"><div class="spor-box">✓</div><span class="spor-text">Hvad mistede vi da landbosamfundet forsvandt – og er der noget vi burde have beholdt?</span></div>
      </div>
      <span class="field-label" style="margin-top:.1rem">Jeres eget spørgsmål (valgfrit)</span>
      <textarea class="work-field" id="f-custom-spor" rows="2" placeholder="Skriv jeres eget spørgsmål her..." oninput="syncField('f-custom-spor')"></textarea>
      <span class="field-label" style="margin-top:.2rem">Jeres konkrete fokus</span>
      <p class="field-note">Nu ved I lidt om emnet – hvad vil I undersøge konkret? Jo mere specifikt jo bedre. Det her fokus følger jer resten af ugen.</p>
      <textarea class="work-field" id="f-fokus" rows="2" placeholder="Fx: Vi fokuserer på hvad der skete med en bestemt type landbrug – fx mejeribruget – fra 1950 til i dag..." oninput="syncField('f-fokus')"></textarea>`
  },
  { num:'Mission 3', title:'Find hullerne i jeres viden',
    left:`<p>Hvad forstår I ikke endnu om jeres konkrete fokus? Hvad kan I ikke svare på?</p>
      <p>Skriv jeres spørgsmål til højre – ét pr. linje. De skal handle om jeres konkrete fokus. Det er dem I undersøger i morgen.</p>
      <p class="note-txt" style="margin-top:.45rem"><span class="hl">I er i mål</span> når I har mindst 5 konkrete huller skrevet ned.</p>`,
    right:`<span class="field-label">Huller i jeres viden</span>
      <p class="field-note">Skriv ét spørgsmål pr. felt. Tirsdag finder I svarene.</p>
      <div id="huller-felter"></div>
      <button class="add-row-btn" onclick="tilfoejHul()">+ tilføj spørgsmål</button>`
  }
],
onsdag:[
  { num:'Mission 1', title:'Saml materialer',
    left:`<p>Hent det I har brug for ifølge jeres plan fra tirsdag. <span class="hl">Brug max 15 minutter.</span></p>
      <p class="note-txt" style="margin-top:.45rem">Brug tjeklisten til højre – sæt kryds når I har det I skal bruge.</p>`,
    right:`__prev_plan__
      <span class="field-label">Tjekliste – har I det I skal bruge?</span>
      <p class="field-note">Gå planen igennem. Sæt hak når I har hentet det. Skriv i feltet hvis noget mangler.</p>
      <div id="checklist-materialer" style="margin-bottom:.75rem"></div>
      <span class="field-label">Mangler noget?</span>
      <textarea class="work-field" id="f-materialer" rows="2" placeholder="Notér hvad der evt. mangler eller skal løses..." oninput="syncField('f-materialer')"></textarea>`
  },
  { num:'Mission 2', title:'Producér',
    left:`<p>Lav produktet. Følg jeres plan. <span class="hl">Alle skal have en aktiv opgave.</span></p>`,
    right:`<span class="field-label">Løbende noter</span>
      <textarea class="work-field" id="f-noter-ons" rows="6" placeholder="Notér undervejs..." oninput="syncField('f-noter-ons')"></textarea>`
  },
  { num:'Mission 3', title:'Tjek inden I pakker',
    left:`<p><span class="hl">Viser produktet jeres pointe tydeligt?</span></p><p>Kan I bruge det aktivt fredag? Skriv jeres vurdering.</p>`,
    right:`<span class="field-label">Vores tjek</span>
      <textarea class="work-field" id="f-tjek" rows="5" placeholder="Viser det vores pointe?&#10;Kan vi bruge det aktivt fredag?" oninput="syncField('f-tjek')"></textarea>`
  }
],
torsdag:[
  { num:'Mission 1', title:'Gør produktet færdigt',
    left:`<p>Brug den første del af torsdag på at gøre produktet helt klar. Gå tjeklisten til højre igennem.</p>
      <p class="note-txt" style="margin-top:.45rem"><span class="hl">I er i mål</span> når alle punkter er sat af og produktet er klar til at bruges fredag.</p>`,
    right:`<span class="field-label">Hvad mangler stadig?</span>
      <p class="field-note">Skriv det der ikke er helt færdigt endnu. Del det op i bider og sæt hak når det er klaret.</p>
      <div id="mangler-list" style="margin-bottom:.6rem"></div>
      <div style="display:flex;gap:.4rem;margin-bottom:.85rem">
        <input id="mangler-input" class="work-field" style="flex:1;min-height:unset;margin-bottom:0;padding:.35rem .5rem" placeholder="Fx: Skriv overskrift på plakaten..." onkeydown="if(event.key==='Enter'){event.preventDefault();addMangler()}">
        <button onclick="addMangler()" style="background:var(--green);border:none;border-radius:3px;color:white;font-family:Verdana,sans-serif;font-size:.75rem;font-weight:700;padding:.35rem .85rem;cursor:pointer;white-space:nowrap">Tilføj</button>
      </div>
      <span class="field-label">Sidst tjek</span>
      <div class="check-item" onclick="toggleCheckItem(this)"><div class="check-box"></div><span>Produktet viser vores pointe</span></div>
      <div class="check-item" onclick="toggleCheckItem(this)"><div class="check-box"></div><span>Produktet hænger sammen med vores spor</span></div>
      <div class="check-item" onclick="toggleCheckItem(this)"><div class="check-box"></div><span>Alle ved hvordan vi bruger produktet fredag</span></div>`
  },
  { num:'Mission 2', title:'Øv fremlæggelsen',
    left:`<p>I dag forbereder I jeres fremlæggelse ordentligt. Det er ikke bare en hurtig øvelse – det er en hel dags arbejde.</p>
      <p style="margin-top:.55rem"><strong>Overvej hvilken form der passer bedst:</strong></p>
      <ul style="margin:.45rem 0 .45rem 1.1rem;font-size:.88rem;line-height:1.75;color:var(--ink)">
        <li>En <strong>præsentation</strong> (PowerPoint, Canva, Google Slides) med billeder og punkter</li>
        <li>En <strong>plakat eller tegning</strong> I fysisk holder op og forklarer</li>
        <li>Et <strong>kort rollespil</strong> eller en demonstration</li>
        <li>En <strong>quiz</strong> til klassen om det I har lært</li>
      </ul>
      <p class="note-txt">Fremlæggelsen må max vare <span class="hl">7 minutter</span>. Alle siger noget. Produktet bruges aktivt.</p>
      <p class="note-txt" style="margin-top:.45rem">Brug guiden til højre – den viser hvad I skal have med.</p>`,
    right:`<div class="fl-step"><div class="fl-num">1</div><div class="fl-body"><div class="fl-text">Fortæl hvad sagen handlede om.</div><span class="pull-lbl">Fra jeres arbejde</span><div class="pull-field" id="pull-sag"></div></div></div>
      <div class="fl-step"><div class="fl-num">2</div><div class="fl-body"><div class="fl-text">Fortæl hvilke spor I valgte – og hvorfor.</div><span class="pull-lbl">Fra jeres arbejde</span><div class="pull-field" id="pull-spor"></div></div></div>
      <div class="fl-step"><div class="fl-num">3</div><div class="fl-body"><div class="fl-text">Fortæl hvilke beviser I fandt.</div><span class="pull-lbl">Fra jeres arbejde</span><div class="pull-field" id="pull-beviser"></div></div></div>
      <div class="fl-step"><div class="fl-num">4</div><div class="fl-body"><div class="fl-text">Brug produktet til at vise jeres pointe.</div><span class="pull-lbl">Fra jeres arbejde</span><div class="pull-field" id="pull-produkt"></div></div></div>
      <div class="fl-step"><div class="fl-num">5</div><div class="fl-body"><div class="fl-text">Forklar hvad jeres svar på sagen er.</div><span class="pull-lbl">Fra jeres arbejde</span><div class="pull-field" id="pull-pointe"></div></div></div>`
  },
  { num:'Mission 3', title:'Evaluer samarbejdet',
    left:`<p>Før I fremlægger evaluerer I jeres samarbejde denne uge. Det handler ikke om hvad I lærte om emnet – men om hvordan I arbejdede sammen.</p>

/* ── RENDER DAY ── */
function renderDay(day){
  const lc=document.getElementById('left-content');
  const rc=document.getElementById('right-content');
  const ms=MISSIONS[day];
  if(!ms){ renderFridayLeft(lc,rc); return; }

  lc.innerHTML='';
  const intro=document.createElement('div'); intro.className='day-intro'; intro.textContent=DAY_INTROS[day]; lc.appendChild(intro);

  // Show feedback from previous day if any
  const prevDay=DAYS[DAYS.indexOf(day)-1];
  if(prevDay && state.feedback[prevDay]){
    const fb=document.createElement('div'); fb.className='prev-feedback';
    fb.innerHTML=`<div class="prev-feedback-lbl">Lærerens kommentar fra ${prevDay}</div><div class="prev-feedback-text">${esc(state.feedback[prevDay])}</div>`;
    lc.appendChild(fb);
  }

  const count=state.unlocked[day];
  ms.forEach((m,i)=>{
    if(i<=count){
      lc.appendChild(makeMissionCard(day,i,m,i<count));
    } else {
      const ph=document.createElement('div'); ph.className='mission-locked';
      ph.textContent=`${m.num}: ${m.title}`; lc.appendChild(ph);
    }
  });

  // Close day button (show when all missions done)
  if(count===ms.length-1 && !state.approved[day]){
    const btn=document.createElement('button'); btn.className='close-day-btn';
    btn.textContent='Afslut dagen og vis opsummering →';
    btn.onclick=()=>openSummary(day);
    lc.appendChild(btn);
  } else if(state.approved[day]){
    const done=document.createElement('div');
    done.style.cssText='text-align:center;padding:1rem;font-size:.82rem;color:var(--green);font-weight:700;';
    done.textContent='✓ Dagen er godkendt af lærer'; lc.appendChild(done);
  }

  // Right pane: show summary if approved, otherwise active mission
  if(state.approved[day]){
    renderApprovedSummary(day);
  } else {
    renderRightForMission(day, count);
  }
}

function makeMissionCard(day,idx,m,done){
  const card=document.createElement('div'); card.className='mission-card'; card.id=`mc-${day}-${idx}`;
  const isOpen=state.expanded[day][idx]!==false;
  if(done) card.classList.add('done');
  if(isOpen) card.classList.add('open');
  if(!done) card.classList.add('active-card');
  const showNext=!done && idx<MISSIONS[day].length-1;

  card.innerHTML=`<div class="mission-header" onclick="toggleCard('${day}',${idx})">
    <div class="mh-check"><div class="mh-checkmark"></div></div>
    <div class="mh-text"><div class="mh-num">${m.num}</div><div class="mh-title">${m.title}</div></div>
    <div class="mh-chevron">▼</div>
  </div>
  <div class="mission-body-wrap"><div class="mission-body-inner"><div class="mission-body">
    ${m.left}
    ${showNext?`<button class="next-btn" onclick="unlockNext('${day}',${idx})">Vi er klar til næste mission →</button>`:''}
  </div></div></div>`;
  return card;
}

function renderRightForMission(day,mIdx){
  const rc=document.getElementById('right-content');
  const m=MISSIONS[day]?.[mIdx]; if(!m) return;
  document.getElementById('right-topbar-label').textContent=`✏ Skriv her – ${m.num}: ${m.title}`;

  let html=m.right;

  // Inject focus badge for tirsdag onwards
  if((day==='mandag'&&mIdx>=2)||day==='tirsdag'||day==='onsdag'||day==='torsdag'){
    const fokus=state.fields['f-fokus']||'';
    if(fokus.trim()){
      html=`<div class="focus-badge">Fokus: ${esc(fokus)}</div>`+html;
    }
  }

  // Inject previous questions for tirsdag mission 1
  if(day==='tirsdag' && mIdx===0){
    const hullerRaw=state.fields['f-huller']||'';
    let prevQ='';
    if(hullerRaw.trim()){
      const lines=hullerRaw.trim().split('\n').filter(l=>l.trim());
      prevQ=`<div class="prev-questions"><div class="prev-q-title">Huller i jeres viden fra mandag – find svarene i dag</div>${lines.map(l=>`<div class="prev-q-item">${esc(l)}</div>`).join('')}</div>`;
    }
    html=html.replace('__prev_questions__',prevQ);
  }

  // Inject plan for onsdag mission 1
  if(day==='onsdag' && mIdx===0){
    const kplan=state.fields['f-kplan']||[];
    let planHtml='';
    if(kplan.length && kplan.some(r=>r.some(v=>v))){
      planHtml=`<div class="prev-questions"><div class="prev-q-title">Jeres plan fra tirsdag</div>${kplan.filter(r=>r[0]).map(r=>`<div class="prev-q-item">${esc(r[0])}${r[1]?' – '+esc(r[1]):''}${r[2]?' ('+esc(r[2])+')'  :''}</div>`).join('')}</div>`;
    }
    html=html.replace('__prev_plan__',planHtml);
  }

  rc.innerHTML=`<div class="work-panel active">${html}</div>`;
  restoreFields(day,mIdx);
  if(day==='torsdag' && mIdx===1) updatePulled();
}

function restoreFields(day,mIdx){
  // Restore text field values (including input elements)
  Object.entries(state.fields).forEach(([id,val])=>{
    if(typeof val==='string'){
      const el=document.getElementById(id);
      if(el && (el.tagName==='TEXTAREA'||el.tagName==='INPUT')) el.value=val;
    }
  });
  // Restore spor
  if(day==='mandag' && mIdx===1){
    (state.fields['f-spor']||[]).forEach(i=>{
      const el=document.querySelectorAll('.spor-item')[i]; if(el) el.classList.add('chosen');
    });
  }
  // Restore kplan
  if(day==='tirsdag' && mIdx===1){
    const kplan=state.fields['f-kplan']||[];
    const c=document.getElementById('kplan-rows'); if(!c) return;
    c.innerHTML='';
    const rows=kplan.length>=3?kplan:[...kplan,...Array(3-kplan.length).fill(['','',''])];
    rows.forEach(rd=>{
      const r=document.createElement('div');r.className='kplan-row';
      r.innerHTML=rd.map(v=>`<input class="kplan-input" value="${esc(v)}" oninput="syncKplan()">`).join('');
      c.appendChild(r);
    });
  }
  // Restore dynamic lists and checkboxes
  setTimeout(restoreDynamicContent, 0);
}

function toggleCard(day,idx){
  const card=document.getElementById(`mc-${day}-${idx}`); if(!card) return;
  const opening=!card.classList.contains('open');
  card.classList.toggle('open',opening);
  state.expanded[day][idx]=opening;
  if(opening) renderRightForMission(day,idx);
}

function unlockNext(day,idx){
  if(state.unlocked[day]<MISSIONS[day].length-1){
    state.expanded[day][idx]=false;
    state.unlocked[day]++;
    state.expanded[day][state.unlocked[day]]=true;
    scheduleSave();
    renderDay(day);
    setTimeout(()=>{
      const el=document.getElementById(`mc-${day}-${state.unlocked[day]}`);
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },80);
  }
}

  state.fields[id]=el.value; scheduleSave();

function updatePulled(){
  const get=id=>state.fields[id]||'';

/* ── DAY NAVIGATION ── */
function getTodayIndex(){ return ({1:0,2:1,3:2,4:3,5:4})[new Date().getDay()]??0; }

function showDay(day,btn){
  currentDay=day;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderDay(day);
}

function tryShowDay(day,btn){
  const idx=DAYS.indexOf(day);
  if(idx<=0){ showDay(day,btn); return; }
  const prevDay=DAYS[idx-1];
  if(!state.approved[prevDay]){
    // Flash the tab
    btn.style.borderColor='var(--red)'; btn.style.color='var(--red)';
    setTimeout(()=>{ btn.style.borderColor=''; btn.style.color=''; },800);
    return;
  }
  showDay(day,btn);
  btn.classList.remove('locked-tab');
}

function unlockDayTab(day){

  if(tab){ tab.classList.remove('locked-tab'); }

function closeSummary(){
  document.getElementById('summary-overlay').classList.remove('open');
}

function approveDay(day){
  const code=document.getElementById('teacher-code-input').value;
  if(code!==TEACHER_CODE){ document.getElementById('approve-error').style.display='block'; return; }
  const comment=document.getElementById('teacher-comment-input').value;
  state.approved[day]=true;
  state.feedback[day]=comment;
  // Save immediately (don't wait)
  saveToCloud();
  closeSummary();
  // Unlock next day tab
  const nextDay=DAYS[DAYS.indexOf(day)+1];
  if(nextDay) unlockDayTab(nextDay);
  renderDay(day);
}

function confirmUndo(day){
  const inp=document.getElementById('undo-code-input'); if(!inp) return;
  if(inp.value===TEACHER_CODE){
    state.approved[day]=false;
    const nextDay=DAYS[DAYS.indexOf(day)+1];
    if(nextDay){ const tab=document.getElementById('tab-'+nextDay); if(tab) tab.classList.add('locked-tab'); }
    scheduleSave();
    renderDay(day);
  } else {
    document.getElementById('undo-error').style.display='block';
    inp.value=''; inp.focus();
  }
}

function getSporText(){
  const chosen=[...document.querySelectorAll('.spor-item.chosen')].map(s=>s.querySelector('.spor-text')?.textContent||'');
  const custom=state.fields['f-custom-spor']||'';
  return [...chosen,...(custom.trim()?[custom.trim()]:[])].join('\n');
}

function buildSporSummary(){
  // Works from stored state (not DOM) so summary is correct even after re-render
  const SPOR_TEXTS=[
    'Hvad skal der til for at et dyr har et godt liv – og bestemmer loven det?',
    'Hvorfor er der så stor forskel på hvordan dyr har det, selv når reglerne er de samme?',
    'Hvornår er det okay at bruge dyr til mad – og hvornår går det for vidt?',
    'Hvis dyrene kunne tale – hvad ville de sige om dansk landbrug?'
  ];
  const indices=state.fields['f-spor']||[];
  const chosen=indices.map(i=>SPOR_TEXTS[i]).filter(Boolean);
  const custom=state.fields['f-custom-spor']||'';
  return [...chosen,...(custom.trim()?[custom.trim()]:[])].join('\n');
}

/* ── FRIDAY ── */
function renderFridayLeft(lc,rc){
  lc.innerHTML=`<div class="day-intro">Her planlægger I fremlæggelserne fredag. Læreren udfylder tidspunkter og rum.</div>
    <div id="friday-lock-area"><div class="friday-lock">
      <div class="lock-icon">🔒</div>
      <div class="lock-label">Kun lærere kan redigere</div>
      <div class="lock-input-wrap"><input type="password" class="lock-input" id="lock-input" placeholder="Kode" onkeydown="if(event.key==='Enter')checkCode()"><button class="lock-btn" onclick="checkCode()">Åbn →</button></div>
      <div class="lock-error" id="lock-error">Forkert kode</div>
    </div></div>
    <div id="friday-teacher" style="display:none"></div>`;
  rc.innerHTML='<div style="padding:2rem 1rem;font-size:.88rem;color:var(--ink-muted);font-style:italic">Fremlæggelsesplanen vises her når læreren har udfyldt den.</div>';
  loadSchedule();
}

function checkCode(){
  if(document.getElementById('lock-input').value===TEACHER_CODE){
    document.getElementById('friday-lock-area').style.display='none';
    buildTeacherBoard();
  } else { document.getElementById('lock-error').style.display='block'; document.getElementById('lock-input').value=''; }
}

function buildTeacherBoard(){
  const t=document.getElementById('friday-teacher'); t.style.display='block';
  t.innerHTML=`<p class="note-txt" style="margin-bottom:.75rem">Træk gruppe-tiles ind på tidspunkterne. Tidspunkterne kan redigeres direkte. Tilføj flere med + knappen.</p>
    <div class="tiles-section"><div class="tiles-lbl">Grupper</div><div class="tiles-pool" id="tiles-pool"></div></div>
    <div class="schedule-board">
      <div class="room-col"><div class="room-hdr">5. klasse</div><div class="time-slots" id="slots-5kl"></div><div style="padding:.22rem .5rem .5rem"><button class="add-slot-btn" onclick="addSlot('5kl')">+ Tilføj tidspunkt</button></div></div>
      <div class="room-col"><div class="room-hdr">6. klasse</div><div class="time-slots" id="slots-6kl"></div><div style="padding:.22rem .5rem .5rem"><button class="add-slot-btn" onclick="addSlot('6kl')">+ Tilføj tidspunkt</button></div></div>
    </div>
    <div style="background:var(--paper2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 3px 3px 0;padding:.6rem .9rem;margin-bottom:.85rem;font-size:.84rem;color:var(--ink-soft)">
      Efter fremlæggelserne: fælles oprydning og evaluering
    </div>
    <button class="next-btn" onclick="saveSchedule()">Gem plan →</button>`;
  const DEFAULT_SLOTS=['09.00 – 09.10','09.20 – 09.30','09.40 – 09.50','10.00 – 10.10','10.30 – 10.40'];
  ['5kl','6kl'].forEach(r=>{
    const s=scheduleData.slots[r]||[];
    if(!s.length){
      scheduleData.slots[r]=DEFAULT_SLOTS.map(ti=>({time:ti,group:''}));
      scheduleData.slots[r].forEach((sl,i)=>renderSlot(r,i,sl.time,sl.group));
    } else {
      s.forEach((sl,i)=>renderSlot(r,i,sl.time,sl.group));
    }
  });
  rebuildTiles();
}

function renderSlot(room,idx,time='',group=''){
  const c=document.getElementById('slots-'+room); if(!c) return;
  const div=document.createElement('div'); div.className='time-slot';
  div.innerHTML=`<div class="slot-tr"><input class="slot-ti" placeholder="fx 08.30" value="${time}" oninput="updSlot('${room}',${idx},this.value)"><button class="slot-rm" onclick="removeSlot('${room}',${idx})">✕</button></div><div class="slot-da" id="drop-${room}-${idx}">${group?`<div class="group-tile placed" draggable="true" data-group="${group}" ondragstart="startDrag(event,this)">${group}</div>`:'<span class="slot-hint">Træk gruppe hertil</span>'}</div>`;
  div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over')});
  div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
  div.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('drag-over');dropTile(room,idx)});
  c.appendChild(div);
  if(!scheduleData.slots[room])scheduleData.slots[room]=[];
  if(!scheduleData.slots[room][idx])scheduleData.slots[room][idx]={time,group};
}
function addSlot(room){if(!scheduleData.slots[room])scheduleData.slots[room]=[];const i=scheduleData.slots[room].length;scheduleData.slots[room].push({time:'',group:''});renderSlot(room,i,'','');}
function removeSlot(room,idx){scheduleData.slots[room].splice(idx,1);buildTeacherBoard();}
function updSlot(room,idx,v){if(scheduleData.slots[room]?.[idx])scheduleData.slots[room][idx].time=v;}
function startDrag(e,tile){dragTile=tile.dataset.group;e.dataTransfer.effectAllowed='move';}
function dropTile(room,idx){if(!dragTile)return;['5kl','6kl'].forEach(r=>(scheduleData.slots[r]||[]).forEach(s=>{if(s.group===dragTile)s.group='';}));scheduleData.slots[room][idx].group=dragTile;dragTile=null;buildTeacherBoard();}
function rebuildTiles(){
  const placed=new Set();['5kl','6kl'].forEach(r=>(scheduleData.slots[r]||[]).forEach(s=>{if(s.group)placed.add(s.group);}));
  const pool=document.getElementById('tiles-pool'); if(!pool) return; pool.innerHTML='';
  pool.addEventListener('dragover',e=>e.preventDefault());
  pool.addEventListener('drop',e=>{e.preventDefault();if(!dragTile)return;['5kl','6kl'].forEach(r=>(scheduleData.slots[r]||[]).forEach(s=>{if(s.group===dragTile)s.group='';}));dragTile=null;buildTeacherBoard();});
  ALL_GROUPS.forEach(g=>{if(placed.has(g))return;const t=document.createElement('div');t.className='group-tile'+(g===GROUP_LABEL?' my-group':'');t.textContent=g;t.draggable=true;t.dataset.group=g;t.addEventListener('dragstart',e=>startDrag(e,t));pool.appendChild(t);});
  if(!pool.children.length)pool.innerHTML='<span class="note-txt">Alle grupper er placeret ✓</span>';
}
async function saveSchedule(){showSave('Gemmer...');try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({gruppe:SCHEDULE_KEY,data:scheduleData})});showSave('Gemt ✓');renderStudentSchedule();}catch(e){showSave('Fejl');}}
async function loadSchedule(){
  try{const r=await fetch(SCRIPT_URL+'?gruppe='+SCHEDULE_KEY);const j=await r.json();
  if(j?.ok&&j.data?.slots){scheduleData=j.data;renderStudentSchedule();}}catch(e){}
}
function renderStudentSchedule(){
  const slots=scheduleData.slots||{};
  if(!Object.values(slots).some(r=>r.some(s=>s.group)))return;
  const rc=document.getElementById('right-content'); if(!rc) return;
  let myTime='',myRoom='';
  ['5kl','6kl'].forEach(r=>(slots[r]||[]).forEach(s=>{if(s.group===GROUP_LABEL){myTime=s.time;myRoom=r==='5kl'?'5. klasse':'6. klasse';}}));
  let html=myTime||myRoom?`<div class="my-slot-banner"><div style="font-size:1.1rem">📍</div><div><div class="my-slot-title">Jeres tidspunkt</div><div class="my-slot-detail">${myTime?'Kl. '+myTime:''} ${myRoom?'· '+myRoom:''}</div></div></div>`:'';
  html+='<div class="all-slots">';
  ['5kl','6kl'].forEach(r=>{
    html+=`<div class="room-list"><div class="room-list-hdr">${r==='5kl'?'5. klasse':'6. klasse'}</div>`;
    (slots[r]||[]).forEach(s=>html+=`<div class="slot-row${s.group===GROUP_LABEL?' my-row':''}"><span class="slot-rt">${s.time||'–'}</span><span class="slot-rg">${s.group||'–'}</span></div>`);
    if(!(slots[r]||[]).length)html+='<div class="slot-row"><span class="slot-rg" style="color:var(--ink-muted);font-style:italic">Ikke udfyldt endnu</span></div>';
    html+='</div>';
  });
  html+='</div>'; rc.innerHTML=html;
  document.getElementById('friday-lock-area')?.style&&(document.getElementById('friday-lock-area').style.display='none');
}

/* ── TYPEWRITER ── */
const twLines=[{el:'tw1',text:'En ny sag er landet på jeres bord...',speed:58},{el:'tw2',text:'I er særligt udvalgt til at efterforske den.',speed:46},{el:'tw3',text:'Klik nedenfor for at åbne sagen.',speed:46}];
async function typeWriter(){for(const l of twLines){await twType(l.el,l.text,l.speed);await twWait(270);}}
function twType(id,text,speed){return new Promise(r=>{const el=document.getElementById(id);let i=0;const t=setInterval(()=>{if(i<text.length)el.textContent=text.slice(0,++i);else{clearInterval(t);r();}},speed);});}
function twWait(ms){return new Promise(r=>setTimeout(r,ms));}

function openCase(){
  document.getElementById('intro').style.display='none';
  const app=document.getElementById('app'); app.style.display='flex';
  const ti=getTodayIndex();
  const todayTab=document.getElementById('tab-'+['mandag','tirsdag','onsdag','torsdag','fredag'][ti]);
  if(todayTab) todayTab.classList.add('today-tab');
  renderDay('mandag');
  loadFromCloud();
}
window.addEventListener('load',typeWriter);

/* ── STATE COLLECT / APPLY ── */
function collectState(){
  return {
    unlocked:state.unlocked,
    expanded:state.expanded,
    approved:state.approved,
    feedback:state.feedback,
    fields:state.fields,
    spor:state.fields['f-spor']||[]
  };
}

function applyState(data){
  if(!data) return;
  if(data.unlocked) Object.assign(state.unlocked, data.unlocked);
  if(data.expanded) Object.assign(state.expanded, data.expanded);
  if(data.approved) Object.assign(state.approved, data.approved);
  if(data.feedback) Object.assign(state.feedback, data.feedback);
  if(data.fields) Object.assign(state.fields, data.fields);
  // Unlock tabs for approved days
  DAYS.forEach((d,i)=>{ if(state.approved[d] && DAYS[i+1]) unlockDayTab(DAYS[i+1]); });
  renderDay(currentDay);
}

async function loadFromCloud(){
  try{const r=await fetch(SCRIPT_URL+'?gruppe='+GK);const j=await r.json();
  if(j?.ok&&j.data&&Object.keys(j.data).length) applyState(j.data);}catch(e){}
}
async function saveToCloud(){
  showSave('Gemmer...');
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({gruppe:GK,data:collectState()})});showSave('Gemt ✓');}
  catch(e){showSave('Fejl ved gem');}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveToCloud,1500);}
function showSave(msg){const el=document.getElementById('save-status');el.textContent=msg;el.classList.add('visible');if(msg==='Gemt ✓')setTimeout(()=>el.classList.remove('visible'),2000);}

function toggleCheckItem(el){
  el.classList.toggle('checked');
  // Persist check state in state.fields keyed by text
  const key='chk-'+el.querySelector('span').textContent.slice(0,20);
  state.fields[key]=el.classList.contains('checked');
  scheduleSave();
}

function addHul(){
  const inp=document.getElementById('huller-input'); if(!inp||!inp.value.trim()) return;
  const text=inp.value.trim(); inp.value='';
  if(!state.fields['f-huller-list']) state.fields['f-huller-list']=[];
  state.fields['f-huller-list'].push({text,done:false});
  renderDelmaal('huller-list','f-huller-list');
  scheduleSave();
}

function toggleHul(i){
  if(!state.fields['f-huller-list']) return;
  state.fields['f-huller-list'][i].done=!state.fields['f-huller-list'][i].done;
  scheduleSave();
  // Re-render tirsdag mission 1 right pane
  renderRightForMission('tirsdag',0);
}

function addDelmaal(){
  const inp=document.getElementById('delmaal-input'); if(!inp||!inp.value.trim()) return;
  const text=inp.value.trim(); inp.value='';
  if(!state.fields['f-delmaal']) state.fields['f-delmaal']=[];
  state.fields['f-delmaal'].push({text,done:false});
  renderDelmaal('delmaal-list','f-delmaal');
  scheduleSave();
}

function addMangler(){
  const inp=document.getElementById('mangler-input'); if(!inp||!inp.value.trim()) return;
  const text=inp.value.trim(); inp.value='';
  if(!state.fields['f-mangler-list']) state.fields['f-mangler-list']=[];
  state.fields['f-mangler-list'].push({text,done:false});
  renderDelmaal('mangler-list','f-mangler-list');
  scheduleSave();
}

function renderDelmaal(containerId, stateKey){
  const c=document.getElementById(containerId); if(!c) return;
  const items=state.fields[stateKey]||[];
  c.innerHTML='';
  items.forEach((item,i)=>{
    const div=document.createElement('div'); div.className='delmaal-item'+(item.done?' done':'');
    div.innerHTML=`<div class="delmaal-box"></div><span>${esc(item.text)}</span>`;
    div.onclick=()=>{
      state.fields[stateKey][i].done=!state.fields[stateKey][i].done;
      renderDelmaal(containerId,stateKey); scheduleSave();
    };
    c.appendChild(div);
  });
}

// Restore dynamic lists and checkboxes after render
function restoreDynamicContent(){
  if(document.getElementById('huller-list')) renderDelmaal('huller-list','f-huller-list');
  if(document.getElementById('delmaal-list')) renderDelmaal('delmaal-list','f-delmaal');
  if(document.getElementById('mangler-list')) renderDelmaal('mangler-list','f-mangler-list');
  // Restore checklist-materialer from kplan
  const cl=document.getElementById('checklist-materialer');
  if(cl){
    const kplan=state.fields['f-kplan']||[];
    cl.innerHTML='';
    kplan.filter(r=>r[0]).forEach(r=>{
      const key='mat-chk-'+r[0].slice(0,20);
      const done=state.fields[key]||false;
      const div=document.createElement('div'); div.className='check-item'+(done?' checked':'');
      div.innerHTML=`<div class="check-box"></div><span>${esc(r[0])}${r[1]?' – <em>'+esc(r[1])+'</em>':''}</span>`;
      div.onclick=function(){
        this.classList.toggle('checked');
        state.fields[key]=this.classList.contains('checked');
        scheduleSave();
      };
      cl.appendChild(div);
    });
    if(!kplan.filter(r=>r[0]).length){
      cl.innerHTML='<p class="note-txt">Ingen plan fundet – gå tilbage til tirsdagens plan.</p>';
    }
  }
  // Restore static check-items state
  document.querySelectorAll('.check-item').forEach(el=>{
    const key='chk-'+(el.querySelector('span')?.textContent||'').slice(0,20);
    if(state.fields[key]) el.classList.add('checked');
  });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
